version: "3.9"

services:

  backend:
    build: ./backend
    container_name: crm_backend

    ports:
      - "8000:8000"

    volumes:
      - ./backend:/app

    env_file:
      - .env

    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: crm_frontend

    ports:
      - "3000:80"

    depends_on:
      - backend

  db:
    image: postgres:16

    container_name: crm_db

    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: crm

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: